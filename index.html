<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NB Sales Performance Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>NB Sales Performance Dashboard</h1>
    </header>
    <main>
        <section id="sales-data">
            <h2>Sales Data</h2>
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Sales</th>
                        <th>Profit</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Product A</td>
                        <td>$10,000</td>
                        <td>$5,000</td>
                    </tr>
                    <tr>
                        <td>Product B</td>
                        <td>$15,000</td>
                        <td>$7,500</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
